name: Frontend CI — Next.js

on:
  push:
    branches: [main, develop]
    paths:
      - 'client/**'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
    workflow_dispatch:  # ← ajouter cette ligne


jobs:
  test:
    name: Tests Jest
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        working-directory: client
        run: npm ci

      - name: 🧪 Run Jest tests
        working-directory: client
        run: npx jest --verbose --ci

  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        working-directory: client
        run: npm ci

      - name: 🏗️ Build
        working-directory: client
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api
        run: npm run build