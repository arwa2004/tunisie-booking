name: Backend CI — Laravel

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  test:
    name: Tests PHPUnit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tunisie_booking_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: 📦 Install dependencies
        working-directory: server
        run: composer install --no-interaction --prefer-dist

      - name: ⚙️ Setup .env
        working-directory: server
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=laravel/DB_DATABASE=tunisie_booking_test/' .env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/' .env

      - name: 🗄️ Run migrations
        working-directory: server
        run: php artisan migrate --force

      - name: 🧪 Run Unit Tests
        working-directory: server
        run: php artisan test --filter Unit --verbose

      - name: 🧪 Run Feature Tests
        working-directory: server
        run: php artisan test --filter Feature --verbose